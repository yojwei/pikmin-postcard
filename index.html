<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 皮克敏風格明信片產生器 (Vue)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 html2canvas 供圖片下載 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body class="bg-neutral-100 font-sans text-neutral-800">
    <div id="app" class="min-h-screen p-4 md:p-8">
        <div class="max-w-4xl mx-auto space-y-6">

            <!-- 標題與介紹 -->
            <div class="text-center space-y-2">
                <h1 class="text-2xl md:text-3xl font-bold text-pink-600">🌸 皮克敏風格明信片產生器</h1>
                <p class="text-neutral-500 text-sm">手機拍張照、取得當前位置，立即製作專屬明信片！</p>
            </div>

            <!-- 控制面板 -->
            <div
                class="bg-white p-5 rounded-2xl shadow-sm border border-neutral-200 grid grid-cols-1 md:grid-cols-2 gap-4">

                <!-- 文字與定位控制 -->
                <div class="space-y-3">
                    <div>
                        <label class="block text-sm font-semibold text-neutral-700 mb-1">1. 設定標題與定位</label>
                        <div class="flex gap-2 mb-3">
                            <div
                                class="flex-1 flex bg-neutral-50 rounded-xl overflow-hidden border border-neutral-200 focus-within:border-pink-400 focus-within:ring-2 focus-within:ring-pink-100 transition-all">
                                <div
                                    class="bg-neutral-100 px-3 flex items-center text-neutral-400 border-r border-neutral-200">
                                    <!-- Edit Icon -->
                                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor"
                                        stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 20h9"></path>
                                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                                    </svg>
                                </div>
                                <input type="text" v-model="title" class="w-full px-3 py-2 bg-transparent outline-none"
                                    placeholder="輸入標題..." />
                            </div>
                            <button @click="generateRandomTitle"
                                class="bg-pink-100 hover:bg-pink-200 text-pink-700 px-3 py-2 rounded-xl flex items-center justify-center transition-colors active:scale-95 shadow-sm"
                                title="隨機產生標題">
                                <!-- Sparkles Icon -->
                                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                                    fill="none" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z">
                                    </path>
                                    <path d="M5 3v4"></path>
                                    <path d="M19 17v4"></path>
                                    <path d="M3 5h4"></path>
                                    <path d="M17 19h4"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <div
                            class="flex-1 flex bg-neutral-50 rounded-xl overflow-hidden border border-neutral-200 focus-within:border-pink-400 transition-all">
                            <input type="text" v-model="location"
                                class="w-full px-3 py-2 bg-transparent outline-none text-sm" placeholder="地點描述..." />
                        </div>
                        <button @click="handleGetLocation" :disabled="isLocating"
                            class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-xl flex items-center gap-2 transition-colors font-medium disabled:opacity-50 whitespace-nowrap active:scale-95">
                            <!-- Loader Icon -->
                            <svg v-if="isLocating" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor"
                                stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"
                                class="animate-spin">
                                <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                            </svg>
                            <!-- MapPin Icon -->
                            <svg v-else viewBox="0 0 24 24" width="18" height="18" stroke="currentColor"
                                stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            <span>定位</span>
                        </button>
                    </div>
                </div>

                <!-- 照片控制 -->
                <div class="space-y-3">
                    <label class="block text-sm font-semibold text-neutral-700 mb-1">2. 選擇照片或拍照</label>
                    <div class="flex gap-2">
                        <input type="file" accept="image/*" capture="environment" id="cameraInput" class="hidden"
                            @change="handlePhotoUpload" />
                        <label for="cameraInput"
                            class="flex-1 flex items-center justify-center gap-2 bg-pink-100 hover:bg-pink-200 text-pink-700 px-4 py-3 rounded-xl cursor-pointer transition-colors font-medium active:scale-95">
                            <!-- Camera Icon -->
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z">
                                </path>
                                <circle cx="12" cy="13" r="3"></circle>
                            </svg>
                            <span>開啟相機 / 相簿</span>
                        </label>
                    </div>
                </div>

                <!-- 皮克敏夥伴選擇區塊 -->
                <div class="md:col-span-2 pt-4 border-t border-neutral-100 space-y-3">
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-semibold text-neutral-700">3. 選擇皮克敏夥伴</label>
                        <span class="text-xs text-neutral-400 font-medium">最多選 5 隻 ({{ selectedPikmins.length
                            }}/5)</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button v-for="option in PIKMIN_OPTIONS" :key="option.id" @click="togglePikmin(option.id)"
                            :class="[
                'flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium transition-all active:scale-95 border',
                selectedPikmins.includes(option.id) 
                  ? option.color + ' text-white border-transparent shadow-md transform scale-105' 
                  : 'bg-white text-neutral-600 border-neutral-200 hover:bg-neutral-50',
                option.id === 'white' && selectedPikmins.includes(option.id) ? '!text-neutral-800 border-neutral-300' : ''
              ]">
                            <span>{{ option.emoji }}</span>
                            <span>{{ option.label }}</span>
                        </button>
                    </div>
                </div>

            </div>

            <!-- 預覽與下載按鈕 -->
            <div class="flex justify-between items-end pb-2 border-b border-neutral-200 mt-8">
                <h2 class="text-xl font-bold text-neutral-800">預覽結果</h2>
                <button @click="handleDownload" :disabled="isDownloading"
                    class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2.5 rounded-full flex items-center gap-2 shadow-md shadow-pink-200 transition-all hover:-translate-y-0.5 active:translate-y-0 active:scale-95 disabled:opacity-70 disabled:hover:translate-y-0">
                    <!-- Loader Icon -->
                    <svg v-if="isDownloading" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor"
                        stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"
                        class="animate-spin">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                    </svg>
                    <!-- Download Icon -->
                    <svg v-else viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                        fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span class="font-semibold">{{ isDownloading ? '處理中...' : '下載明信片' }}</span>
                </button>
            </div>

            <!-- 明信片本體 -->
            <div
                class="w-full overflow-hidden flex justify-center bg-white border border-neutral-200 p-2 rounded-xl shadow-sm">
                <div ref="postcardRef"
                    class="relative flex w-full max-w-[800px] aspect-[1.6/1] bg-[#e3aaa6] p-[2.5%] rounded shadow-sm overflow-hidden select-none"
                    style="box-sizing: border-box;">
                    <!-- 左側：照片區 -->
                    <div
                        class="relative w-[65%] h-full bg-black flex flex-col justify-center items-center overflow-hidden">

                        <img v-if="photo" :src="photo" alt="User photo"
                            class="absolute inset-0 w-full h-full object-cover" />

                        <div v-else class="text-neutral-600 flex flex-col items-center gap-2 opacity-50">
                            <!-- ImageIcon -->
                            <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="2"
                                fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <span class="text-sm">等待照片...</span>
                        </div>

                        <!-- 左上角文字疊加 -->
                        <div class="absolute top-[5%] left-[5%] text-white z-10"
                            style="text-shadow: 1px 1px 3px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5);">
                            <h2 class="font-bold tracking-wide text-lg sm:text-2xl md:text-3xl lg:text-4xl">
                                {{ title || ' ' }}
                            </h2>
                            <p class="font-medium mt-1 text-xs sm:text-sm md:text-base tracking-wider text-gray-100">
                                {{ location || ' ' }}
                            </p>
                        </div>

                        <!-- 底部皮克敏裝飾疊加 -->
                        <div
                            class="absolute bottom-0 left-0 w-full h-[55%] pointer-events-none z-10 flex items-end justify-center gap-1 sm:gap-3 pb-[1%]">
                            <template v-for="option in PIKMIN_OPTIONS" :key="'img-'+option.id">
                                <div v-if="selectedPikmins.includes(option.id)"
                                    class="relative h-full max-h-[90%] w-[18%] flex justify-center items-end drop-shadow-[0_8px_10px_rgba(0,0,0,0.6)] transition-transform hover:scale-105">
                                    <img :src="option.imgUrl" :alt="option.label" crossorigin="anonymous"
                                        class="max-w-full max-h-full object-contain object-bottom select-none"
                                        @error="handleImgError($event, option.id)" />
                                    <div
                                        class="hidden absolute inset-0 items-end justify-center pb-4 text-[clamp(20px,4vw,40px)] drop-shadow-lg">
                                        {{ option.emoji }}
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- 右側：設計區 -->
                    <div class="relative w-[35%] h-full bg-[#fdfaf2] overflow-hidden border-l-[3px] border-white">

                        <!-- 背景花瓣裝飾 (SVG 模擬層疊水彩感) -->
                        <svg class="absolute inset-0 w-full h-full pointer-events-none opacity-90"
                            preserveAspectRatio="xMidYMid slice" viewBox="0 0 200 300">
                            <path d="M-20,0 Q30,10 40,50 Q10,60 -20,30 Z" fill="#eacbe5" opacity="0.85" />
                            <path d="M-10,30 C20,20 60,50 30,80 Z" fill="#f7b5c8" opacity="0.8" />
                            <path d="M20,-10 C50,0 60,40 30,50 C0,30 -10,10 20,-10 Z" fill="#f8cfdd" opacity="0.9" />
                            <path d="M220,70 C170,60 140,100 150,150 C180,180 220,150 220,70 Z" fill="#b9e1db"
                                opacity="0.85" />
                            <path d="M210,130 C190,140 180,180 200,200 C220,210 230,160 210,130 Z" fill="#c4dfec"
                                opacity="0.7" />
                            <circle cx="170" cy="240" r="50" fill="#fbd1df" opacity="0.9" />
                            <path d="M130,210 C180,190 220,230 180,270 C140,290 100,240 130,210 Z" fill="#f4a7c0"
                                opacity="0.85" />
                            <path d="M150,230 C190,220 200,260 170,280 C130,290 120,250 150,230 Z" fill="#ffffff"
                                opacity="0.5" />
                            <circle cx="190" cy="270" r="30" fill="#eacbe5" opacity="0.7" />
                            <path d="M-20,180 C30,170 50,220 20,260 C-10,280 -30,230 -20,180 Z" fill="#f8cfdd"
                                opacity="0.9" />
                            <path d="M10,230 C60,210 80,270 40,310 C0,330 -20,270 10,230 Z" fill="#f4a7c0"
                                opacity="0.8" />
                            <path d="M40,260 C90,250 100,310 60,340 C20,350 10,290 40,260 Z" fill="#eacbe5"
                                opacity="0.75" />
                            <path d="M90,120 C105,100 120,115 110,135 C100,145 80,130 90,120 Z" fill="#f4a7c0"
                                opacity="0.8" />
                            <path d="M160,30 C175,20 185,35 175,50 C165,60 145,45 160,30 Z" fill="#eacbe5"
                                opacity="0.7" />
                            <path d="M50,150 C65,140 75,160 65,175 C55,185 35,165 50,150 Z" fill="#b9e1db"
                                opacity="0.8" />
                        </svg>

                        <!-- Logo: PIKMIN BLOOM -->
                        <div class="absolute top-[5%] left-[6%] z-10 flex items-start gap-1 drop-shadow-sm">
                            <div class="flex flex-col items-start leading-none font-black">
                                <span class="text-[#3ed096] text-[clamp(14px,2.2vw,28px)] tracking-wider"
                                    :style="{ WebkitTextStroke: '2.5px white', paintOrder: 'stroke fill' }">PIKMIN</span>
                                <span class="text-[#3ed096] text-[clamp(14px,2.2vw,28px)] tracking-wider -mt-[5%]"
                                    :style="{ WebkitTextStroke: '2.5px white', paintOrder: 'stroke fill' }">BLOOM</span>
                            </div>
                            <span
                                class="text-[clamp(10px,1.5vw,18px)] mt-[2%] transform rotate-12 drop-shadow-md">🌱</span>
                        </div>

                        <!-- 郵票 Stamp -->
                        <div class="absolute top-[8%] right-[8%] z-20 w-[26%] aspect-[0.8] p-[1.5%] shadow-md" :style="{
                            background: `linear-gradient(135deg, ${currentStampVariant?.frameFrom || '#e34857'} 0%, ${currentStampVariant?.frameTo || '#be2948'} 100%)`,
                            transform: `rotate(${currentStampVariant?.rotation ?? currentStampVariant?.rotationDeg ?? 2}deg)`
                        }">
                            <div class="w-full h-full border-[1.5px] flex flex-col items-center justify-between relative p-[5%]"
                                :style="{
                                    borderColor: currentStampVariant?.borderColor || 'rgba(255,255,255,0.82)',
                                    borderStyle: currentStampVariant?.borderStyle || 'dashed',
                                    background: currentStampVariant?.innerBackground || currentStampVariant?.innerBg || 'rgba(255,255,255,0.08)'
                                }">

                                <svg v-if="['gem-heart','gem','diamond','crystal','寶石'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <polygon points="30,20 50,35 15,40 20,25" fill="#f8b456" />
                                    <polygon points="30,20 70,20 50,35" fill="#fae6e3" />
                                    <polygon points="70,20 80,25 85,40 50,35" fill="#f47fae" />
                                    <polygon points="15,40 50,35 50,65 10,50" fill="#69bbf2" />
                                    <polygon points="85,40 50,35 50,65 90,50" fill="#e395d8" />
                                    <polygon points="10,50 50,65 50,95" fill="#4166d1" />
                                    <polygon points="90,50 50,65 50,95" fill="#9c6fd8" />
                                </svg>
                                <svg v-else-if="['petal-wave','flower','blossom','sakura','花朵'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <circle cx="50" cy="50" r="11" fill="#ffe7ad" />
                                    <ellipse cx="50" cy="30" rx="12" ry="18" fill="#ffd0de" />
                                    <ellipse cx="68" cy="44" rx="12" ry="18" fill="#ffc0d2" />
                                    <ellipse cx="62" cy="66" rx="12" ry="18" fill="#ffb0c9" />
                                    <ellipse cx="38" cy="66" rx="12" ry="18" fill="#ffc5d6" />
                                    <ellipse cx="32" cy="44" rx="12" ry="18" fill="#ffd9e4" />
                                </svg>
                                <svg v-else-if="['citrus-star','star','sparkle','burst','星星'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <polygon points="50,12 60,38 88,38 66,54 74,82 50,66 26,82 34,54 12,38 40,38"
                                        fill="#ffe082" />
                                    <circle cx="50" cy="50" r="9" fill="#fff6cc" />
                                </svg>
                                <svg v-else-if="['prism-dusk','prism','crystal-prism'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <polygon points="50,10 84,36 72,86 28,86 16,36" fill="#d8b4fe" />
                                    <polygon points="50,24 70,39 63,73 37,73 30,39" fill="#f3e8ff" opacity="0.85" />
                                    <path d="M28 86 L50 58 L72 86 Z" fill="#a855f7" opacity="0.9" />
                                </svg>
                                <svg v-else-if="['ocean-comet','comet','wave-comet'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <path d="M20 58 C42 58 58 45 72 28 L80 36 C66 52 48 68 22 68 Z" fill="#7dd3fc" />
                                    <circle cx="74" cy="29" r="11" fill="#38bdf8" />
                                    <circle cx="76" cy="27" r="4" fill="#e0f2fe" />
                                </svg>
                                <svg v-else-if="['cloud-bloom','cloud','mist-bloom'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <circle cx="36" cy="48" r="13" fill="#fbcfe8" />
                                    <circle cx="50" cy="42" r="16" fill="#f9a8d4" />
                                    <circle cx="64" cy="49" r="12" fill="#f472b6" />
                                    <ellipse cx="50" cy="60" rx="24" ry="10" fill="#fdf2f8" opacity="0.85" />
                                </svg>
                                <svg v-else-if="['aurora-spark','aurora','spark'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <path d="M18 58 C32 43 45 41 82 26 C69 43 56 55 22 73 Z" fill="#67e8f9" />
                                    <path d="M20 52 C34 36 50 32 78 24 C67 38 53 49 24 66 Z" fill="#818cf8"
                                        opacity="0.85" />
                                    <circle cx="68" cy="28" r="6" fill="#e0f2fe" />
                                </svg>
                                <svg v-else-if="['leaf-crown','leaf','sprout','plant','葉子'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <circle cx="40" cy="36" r="14" fill="#7fd36c" />
                                    <circle cx="60" cy="36" r="14" fill="#66c95f" />
                                    <circle cx="40" cy="56" r="14" fill="#66bf58" />
                                    <circle cx="60" cy="56" r="14" fill="#86db73" />
                                    <path d="M50 68 C50 74 47 79 43 84" stroke="#4a9a43" stroke-width="4" fill="none"
                                        stroke-linecap="round" />
                                </svg>
                                <svg v-else-if="['berry-flare','berry','heart','love','愛心'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <path d="M50 84 C34 70 18 58 18 40 C18 29 27 20 38 20 C44 20 48 23 50 28 C52 23 56 20 62 20 C73 20 82 29 82 40 C82 58 66 70 50 84 Z"
                                        fill="#ff8fb1" />
                                    <path d="M50 76 C38 64 26 54 26 40 C26 33 31 28 38 28 C44 28 48 31 50 35 C52 31 56 28 62 28 C69 28 74 33 74 40 C74 54 62 64 50 76 Z"
                                        fill="#ffd4e3" opacity="0.85" />
                                </svg>
                                <svg v-else-if="['moon-glint','moon','crescent','night','月亮'].includes(currentStampVariant?.motifType || currentStampVariant?.motif)"
                                    viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <circle cx="55" cy="50" r="25" fill="#fde68a" />
                                    <circle cx="65" cy="45" r="24" fill="#2f4361" />
                                    <circle cx="38" cy="35" r="3" fill="#fff7d2" />
                                    <circle cx="44" cy="64" r="2.5" fill="#fff7d2" />
                                    <circle cx="30" cy="54" r="2" fill="#fff7d2" />
                                </svg>
                                <svg v-else viewBox="0 0 100 100" class="w-[85%] mt-[5%] drop-shadow-sm overflow-visible">
                                    <polygon points="30,20 50,35 15,40 20,25" fill="#f8b456" />
                                    <polygon points="30,20 70,20 50,35" fill="#fae6e3" />
                                    <polygon points="70,20 80,25 85,40 50,35" fill="#f47fae" />
                                    <polygon points="15,40 50,35 50,65 10,50" fill="#69bbf2" />
                                    <polygon points="85,40 50,35 50,65 90,50" fill="#e395d8" />
                                    <polygon points="10,50 50,65 50,95" fill="#4166d1" />
                                    <polygon points="90,50 50,65 50,95" fill="#9c6fd8" />
                                </svg>

                                <div class="absolute bottom-[2%] left-[8%] font-black text-[clamp(12px,1.8vw,22px)] leading-none"
                                    :style="{
                                        color: currentStampVariant?.priceColor || '#ffffff',
                                        textShadow: '0 1px 2px rgba(0,0,0,0.45), 0 0 1px rgba(0,0,0,0.5)'
                                    }">
                                    {{ stampPrice ?? 30 }}
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const photo = ref(null);
                const title = ref('奴才,高級罐罐呢');
                const location = ref('江陵里, 新店區');
                const isLocating = ref(false);
                const isDownloading = ref(false);
                const postcardRef = ref(null);
                const STAMP_VARIANTS = [
                    {
                        id: 'ruby-blossom',
                        motif: 'gem-heart',
                        frameFrom: '#fb7185',
                        frameTo: '#e11d48',
                        innerBg: 'rgba(255,255,255,0.10)',
                        borderColor: 'rgba(255,255,255,0.85)',
                        borderStyle: 'dashed',
                        priceColor: '#ffffff',
                        rotationDeg: 2
                    },
                    {
                        id: 'mint-splash',
                        motif: 'petal-wave',
                        frameFrom: '#34d399',
                        frameTo: '#0f766e',
                        innerBg: 'rgba(240,255,250,0.12)',
                        borderColor: 'rgba(220,252,231,0.92)',
                        borderStyle: 'dotted',
                        priceColor: '#ecfeff',
                        rotationDeg: -3
                    },
                    {
                        id: 'citrus-pop',
                        motif: 'citrus-star',
                        frameFrom: '#facc15',
                        frameTo: '#f97316',
                        innerBg: 'rgba(255,251,235,0.20)',
                        borderColor: 'rgba(255,247,237,0.88)',
                        borderStyle: 'solid',
                        priceColor: '#7c2d12',
                        rotationDeg: 4
                    },
                    {
                        id: 'amethyst-dream',
                        motif: 'prism-dusk',
                        frameFrom: '#a855f7',
                        frameTo: '#6d28d9',
                        innerBg: 'rgba(243,232,255,0.16)',
                        borderColor: 'rgba(250,245,255,0.9)',
                        borderStyle: 'double',
                        priceColor: '#f5f3ff',
                        rotationDeg: -2
                    },
                    {
                        id: 'cobalt-night',
                        motif: 'ocean-comet',
                        frameFrom: '#38bdf8',
                        frameTo: '#1d4ed8',
                        innerBg: 'rgba(219,234,254,0.12)',
                        borderColor: 'rgba(239,246,255,0.92)',
                        borderStyle: 'dashed',
                        priceColor: '#f8fafc',
                        rotationDeg: 3
                    },
                    {
                        id: 'sakura-mist',
                        motif: 'cloud-bloom',
                        frameFrom: '#f9a8d4',
                        frameTo: '#db2777',
                        innerBg: 'rgba(253,242,248,0.16)',
                        borderColor: 'rgba(255,255,255,0.9)',
                        borderStyle: 'dotted',
                        priceColor: '#fff1f2',
                        rotationDeg: -4
                    },
                    {
                        id: 'aurora-sky',
                        motif: 'aurora-spark',
                        frameFrom: '#22d3ee',
                        frameTo: '#818cf8',
                        innerBg: 'rgba(224,231,255,0.15)',
                        borderColor: 'rgba(224,242,254,0.9)',
                        borderStyle: 'solid',
                        priceColor: '#ecfeff',
                        rotationDeg: 1
                    },
                    {
                        id: 'sunlit-leaf',
                        motif: 'leaf-crown',
                        frameFrom: '#84cc16',
                        frameTo: '#4d7c0f',
                        innerBg: 'rgba(247,254,231,0.15)',
                        borderColor: 'rgba(236,253,245,0.9)',
                        borderStyle: 'dashed',
                        priceColor: '#f7fee7',
                        rotationDeg: -1
                    },
                    {
                        id: 'berry-garden',
                        motif: 'berry-flare',
                        frameFrom: '#f472b6',
                        frameTo: '#9333ea',
                        innerBg: 'rgba(250,245,255,0.14)',
                        borderColor: 'rgba(252,231,243,0.9)',
                        borderStyle: 'double',
                        priceColor: '#fff7ed',
                        rotationDeg: 5
                    },
                    {
                        id: 'moonstone-frost',
                        motif: 'moon-glint',
                        frameFrom: '#cbd5e1',
                        frameTo: '#64748b',
                        innerBg: 'rgba(248,250,252,0.22)',
                        borderColor: 'rgba(255,255,255,0.88)',
                        borderStyle: 'solid',
                        priceColor: '#f8fafc',
                        rotationDeg: -5
                    }
                ];

                const STAMP_MOTIF_PALETTES = {
                    'gem-heart': ['#f8b456', '#fae6e3', '#f47fae', '#69bbf2', '#e395d8', '#4166d1', '#9c6fd8'],
                    'petal-wave': ['#a7f3d0', '#34d399', '#2dd4bf', '#5eead4', '#14b8a6', '#0f766e', '#99f6e4'],
                    'citrus-star': ['#fde68a', '#facc15', '#fb923c', '#f59e0b', '#f97316', '#fef3c7', '#ea580c'],
                    'prism-dusk': ['#ddd6fe', '#c4b5fd', '#a78bfa', '#8b5cf6', '#7c3aed', '#6d28d9', '#ede9fe'],
                    'ocean-comet': ['#bae6fd', '#7dd3fc', '#38bdf8', '#0ea5e9', '#2563eb', '#1d4ed8', '#dbeafe'],
                    'cloud-bloom': ['#fbcfe8', '#f9a8d4', '#f472b6', '#ec4899', '#db2777', '#be185d', '#fdf2f8'],
                    'aurora-spark': ['#cffafe', '#67e8f9', '#22d3ee', '#06b6d4', '#818cf8', '#6366f1', '#e0f2fe'],
                    'leaf-crown': ['#d9f99d', '#a3e635', '#84cc16', '#65a30d', '#4d7c0f', '#bef264', '#ecfccb'],
                    'berry-flare': ['#fbcfe8', '#f472b6', '#ec4899', '#d946ef', '#a855f7', '#9333ea', '#fae8ff'],
                    'moon-glint': ['#e2e8f0', '#cbd5e1', '#94a3b8', '#64748b', '#475569', '#334155', '#f1f5f9']
                };

                const stampPrice = ref(30);
                const currentStampVariant = ref(STAMP_VARIANTS[0]);
                const getStampElements = () => {
                    if (!(postcardRef.value instanceof HTMLElement)) {
                        return null;
                    }

                    const stampContainer = postcardRef.value.querySelector('div[class*="aspect-[0.8]"]');
                    if (!(stampContainer instanceof HTMLElement)) {
                        return null;
                    }

                    const innerFrame = stampContainer.firstElementChild instanceof HTMLElement
                        ? stampContainer.firstElementChild
                        : null;
                    const priceElementRaw = stampContainer.querySelector('div[class*="font-black"]');
                    const motifSvgRaw = stampContainer.querySelector('svg[viewBox="0 0 100 100"]');

                    return {
                        stampContainer,
                        innerFrame,
                        priceElement: priceElementRaw instanceof HTMLElement ? priceElementRaw : null,
                        motifSvg: motifSvgRaw instanceof SVGElement ? motifSvgRaw : null
                    };
                };
                const applyStampVariantToDom = (variant) => {
                    if (!variant) return;

                    const stampElements = getStampElements();
                    if (!stampElements) return;

                    const { stampContainer, innerFrame, priceElement, motifSvg } = stampElements;
                    stampContainer.dataset.stampVariantId = variant.id;
                    stampContainer.style.background = `linear-gradient(160deg, ${variant.frameFrom}, ${variant.frameTo})`;
                    stampContainer.style.transform = `rotate(${variant.rotationDeg}deg)`;

                    if (innerFrame) {
                        innerFrame.style.background = variant.innerBg;
                        innerFrame.style.borderColor = variant.borderColor;
                        innerFrame.style.borderStyle = variant.borderStyle;
                    }

                    if (priceElement) {
                        priceElement.style.color = variant.priceColor;
                        priceElement.textContent = String(stampPrice.value);
                    }

                    if (motifSvg) {
                        motifSvg.dataset.motif = variant.motif;
                        const palette = STAMP_MOTIF_PALETTES[variant.motif] || STAMP_MOTIF_PALETTES['gem-heart'];
                        motifSvg.querySelectorAll('polygon').forEach((polygon, index) => {
                            polygon.setAttribute('fill', palette[index % palette.length]);
                        });
                    }
                };
                const rollRandomStampVariant = () => {
                    const randomIndex = Math.floor(Math.random() * STAMP_VARIANTS.length);
                    const nextVariant = STAMP_VARIANTS[randomIndex];
                    currentStampVariant.value = nextVariant;
                    applyStampVariantToDom(nextVariant);
                    return nextVariant;
                };

                rollRandomStampVariant();
                onMounted(() => {
                    applyStampVariantToDom(currentStampVariant.value);
                });

                const PIKMIN_BASE_OPTIONS = [
                    { id: 'red', label: '紅色', color: 'bg-red-500', emoji: '🔴' },
                    { id: 'blue', label: '藍色', color: 'bg-blue-500', emoji: '🔵' },
                    { id: 'yellow', label: '黃色', color: 'bg-yellow-400', emoji: '🟡' },
                    { id: 'purple', label: '紫色', color: 'bg-purple-600', emoji: '🟣' },
                    { id: 'rock', label: '岩石', color: 'bg-neutral-700', emoji: '🪨' },
                    { id: 'white', label: '白色', color: 'bg-gray-100', emoji: '⚪' },
                    { id: 'winged', label: '羽翅', color: 'bg-pink-400', emoji: '🧚' },
                ];

                const createPikminDataUrlGroup = (pikmins) => {
                    const bgColors = {
                        red: '#ef4444',
                        blue: '#3b82f6',
                        yellow: '#facc15',
                        purple: '#9333ea',
                        rock: '#525252',
                        white: '#f5f5f5',
                        winged: '#f472b6'
                    };

                    return pikmins.reduce((group, option) => {
                        const textColor = option.id === 'white' ? '#1f2937' : '#ffffff';
                        const borderColor = option.id === 'white' ? '#d1d5db' : '#ffffff55';
                        const svg = `
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
                                <rect width="180" height="180" rx="28" fill="${bgColors[option.id] || '#a1a1aa'}" stroke="${borderColor}" stroke-width="6" />
                                <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" font-size="96" fill="${textColor}">
                                    ${option.emoji}
                                </text>
                            </svg>
                        `.trim();
                        group[option.id] = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
                        return group;
                    }, {});
                };

                const PIKMIN_SOURCE_STORAGE_KEY = 'pikmin-source-group-index';
                const PIKMIN_SOURCE_JSON_URL = 'pikmin_sources.json';
                const getNextSourceGroupIndex = (groupCount) => {
                    if (groupCount <= 1) return 0;

                    try {
                        const lastIndexRaw = localStorage.getItem(PIKMIN_SOURCE_STORAGE_KEY);
                        const lastIndex = Number.parseInt(lastIndexRaw ?? '', 10);
                        const normalizedLast = Number.isNaN(lastIndex)
                            ? -1
                            : ((lastIndex % groupCount) + groupCount) % groupCount;
                        const nextIndex = (normalizedLast + 1) % groupCount;
                        localStorage.setItem(PIKMIN_SOURCE_STORAGE_KEY, String(nextIndex));
                        return nextIndex;
                    } catch (error) {
                        console.warn('無法存取 localStorage，改用預設圖片來源群組。', error);
                        return 0;
                    }
                };

                const normalizePikminSourceGroup = (rawGroup) => {
                    if (!rawGroup || typeof rawGroup !== 'object' || Array.isArray(rawGroup)) {
                        return null;
                    }

                    const normalizedGroup = {};
                    PIKMIN_BASE_OPTIONS.forEach((option) => {
                        const source = rawGroup[option.id];
                        if (typeof source === 'string' && source.trim()) {
                            normalizedGroup[option.id] = source.trim();
                        }
                    });

                    return Object.keys(normalizedGroup).length ? normalizedGroup : null;
                };

                const extractPikminSourceGroups = (payload) => {
                    if (Array.isArray(payload)) return payload;
                    if (payload && typeof payload === 'object') {
                        if (Array.isArray(payload.sourceGroups)) {
                            return payload.sourceGroups;
                        }
                        if (Array.isArray(payload.groups)) {
                            return payload.groups;
                        }
                    }
                    return null;
                };

                const pikminDataUrlFallbackGroup = createPikminDataUrlGroup(PIKMIN_BASE_OPTIONS);
                const pikminSourceGroups = ref([pikminDataUrlFallbackGroup]);
                const primarySourceGroupIndex = ref(0);
                const buildPikminOptions = (sourceGroups, sourceGroupIndex) => {
                    const safeGroups = Array.isArray(sourceGroups) && sourceGroups.length
                        ? sourceGroups
                        : [pikminDataUrlFallbackGroup];
                    const normalizedIndex = ((sourceGroupIndex % safeGroups.length) + safeGroups.length) % safeGroups.length;

                    return PIKMIN_BASE_OPTIONS.map((option) => ({
                        ...option,
                        imgUrl: safeGroups[normalizedIndex]?.[option.id] || pikminDataUrlFallbackGroup[option.id]
                    }));
                };
                const PIKMIN_OPTIONS = ref(buildPikminOptions(pikminSourceGroups.value, primarySourceGroupIndex.value));
                const applyPikminSourceGroups = (normalizedGroups, rotateByStorage = false) => {
                    const nextGroups = [...normalizedGroups, pikminDataUrlFallbackGroup];
                    pikminSourceGroups.value = nextGroups;
                    primarySourceGroupIndex.value = rotateByStorage
                        ? getNextSourceGroupIndex(nextGroups.length)
                        : 0;
                    PIKMIN_OPTIONS.value = buildPikminOptions(
                        pikminSourceGroups.value,
                        primarySourceGroupIndex.value
                    );
                };

                const loadPikminSourceGroups = async () => {
                    let response;
                    try {
                        response = await fetch(PIKMIN_SOURCE_JSON_URL, { cache: 'no-store' });
                    } catch (error) {
                        console.warn('無法載入 pikmin_sources.json，改用內建圖示來源。', error);
                        return;
                    }

                    if (!response.ok) {
                        console.warn(`載入 pikmin_sources.json 失敗（${response.status}），改用內建圖示來源。`);
                        return;
                    }

                    let sourcePayload;
                    try {
                        sourcePayload = await response.json();
                    } catch (error) {
                        console.warn('pikmin_sources.json 解析失敗，改用內建圖示來源。', error);
                        return;
                    }

                    const rawSourceGroups = extractPikminSourceGroups(sourcePayload);
                    if (!rawSourceGroups) {
                        console.warn('pikmin_sources.json 格式不正確，改用內建圖示來源。');
                        return;
                    }

                    const normalizedGroups = rawSourceGroups
                        .map((group) => normalizePikminSourceGroup(group))
                        .filter((group) => Boolean(group));
                    if (!normalizedGroups.length) {
                        console.warn('pikmin_sources.json 沒有可用來源群組，改用內建圖示來源。');
                        return;
                    }

                    applyPikminSourceGroups(normalizedGroups, true);
                };
                loadPikminSourceGroups();

                const selectedPikmins = ref(['purple', 'yellow', 'rock']);

                const togglePikmin = (id) => {
                    if (selectedPikmins.value.includes(id)) {
                        selectedPikmins.value = selectedPikmins.value.filter(p => p !== id);
                    } else {
                        if (selectedPikmins.value.length >= 5) {
                            alert('畫面塞不下啦！最多只能選擇 5 隻皮克敏喔！');
                            return;
                        }
                        selectedPikmins.value.push(id);
                    }
                };

                const generateRandomTitle = () => {
                    const randomTitles = [
                        '奴才,高級罐罐呢',
                        '發現巨大水果！',
                        '今天的散步路線不錯',
                        '路邊的野花不要採',
                        '本汪/喵今天也很可愛',
                        '快看！是皮克敏！',
                        '這天氣適合睡午覺',
                        '世界第一可愛！',
                        '正在執行機密任務...',
                        '帶我回家吧！'
                    ];
                    const randomIndex = Math.floor(Math.random() * randomTitles.length);
                    title.value = randomTitles[randomIndex];
                };

                const handlePhotoUpload = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            photo.value = event.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                };

                const handleGetLocation = () => {
                    if (!navigator.geolocation) {
                        alert('您的瀏覽器不支援地理定位功能');
                        return;
                    }

                    isLocating.value = true;
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const { latitude, longitude } = position.coords;
                            try {
                                const response = await fetch(
                                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&accept-language=zh-TW`
                                );
                                const data = await response.json();

                                if (data && data.address) {
                                    const addr = data.address;
                                    const village = addr.village || addr.suburb || addr.neighbourhood || '';
                                    const district = addr.town || addr.city_district || addr.county || addr.city || '';

                                    let finalLocation = '';
                                    if (village && district) finalLocation = `${village}, ${district}`;
                                    else if (village) finalLocation = village;
                                    else if (district) finalLocation = district;
                                    else finalLocation = '未知地點';

                                    location.value = finalLocation;
                                } else {
                                    location.value = '無法解析詳細地址';
                                }
                            } catch (error) {
                                console.error("Geocoding error:", error);
                                location.value = '定位解析失敗';
                            } finally {
                                isLocating.value = false;
                            }
                        },
                        (error) => {
                            console.error("Geolocation error:", error);
                            alert('無法獲取位置，請確認是否已授權定位權限。');
                            isLocating.value = false;
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                };

                const handleDownload = () => {
                    isDownloading.value = true;

                    if (!window.html2canvas) {
                        alert('截圖工具載入中，請稍後再試！');
                        isDownloading.value = false;
                        return;
                    }

                    if (postcardRef.value) {
                        window.html2canvas(postcardRef.value, {
                            scale: 2,
                            useCORS: true,
                            backgroundColor: null
                        }).then((canvas) => {
                            const link = document.createElement('a');
                            link.download = `pikmin-postcard-${Date.now()}.png`;
                            link.href = canvas.toDataURL('image/png');
                            link.click();
                            isDownloading.value = false;
                        }).catch(err => {
                            console.error("Canvas export failed", err);
                            alert("輸出圖片失敗");
                            isDownloading.value = false;
                        });
                    }
                };

                const handleImgError = (e, optionId) => {
                    const imgEl = e.target;
                    const attemptedRaw = imgEl.dataset.attemptedSourceGroups || '';
                    const attemptedGroups = attemptedRaw
                        .split(',')
                        .map(v => Number.parseInt(v, 10))
                        .filter(v => !Number.isNaN(v));

                    if (!attemptedGroups.includes(primarySourceGroupIndex.value)) {
                        attemptedGroups.push(primarySourceGroupIndex.value);
                    }

                    for (let offset = 1; offset < pikminSourceGroups.value.length; offset += 1) {
                        const nextGroupIndex = (primarySourceGroupIndex.value + offset) % pikminSourceGroups.value.length;
                        if (attemptedGroups.includes(nextGroupIndex)) continue;

                        const nextUrl = pikminSourceGroups.value[nextGroupIndex]?.[optionId];
                        if (nextUrl) {
                            attemptedGroups.push(nextGroupIndex);
                            imgEl.dataset.attemptedSourceGroups = attemptedGroups.join(',');
                            imgEl.src = nextUrl;
                            return;
                        }
                    }

                    imgEl.style.display = 'none';
                    if (imgEl.nextElementSibling) {
                        imgEl.nextElementSibling.style.display = 'flex';
                    }
                };

                return {
                    photo,
                    title,
                    location,
                    isLocating,
                    isDownloading,
                    postcardRef,
                    currentStampVariant,
                    stampPrice,
                    PIKMIN_OPTIONS,
                    selectedPikmins,
                    togglePikmin,
                    generateRandomTitle,
                    rollRandomStampVariant,
                    handlePhotoUpload,
                    handleGetLocation,
                    handleDownload,
                    handleImgError
                };
            }
        }).mount('#app');
    </script>
</body>
